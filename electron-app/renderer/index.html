<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipSync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <span>ClipSync</span>
      <button id="closeBtn">&times;</button>
    </div>

    <div id="namePrompt" class="hidden">
      <h3>Name this PC</h3>
      <p>Give your PC a name so your phone can find it</p>
      <input type="text" id="nameInput" placeholder="My PC">
      <button id="nameSubmit">Save</button>
    </div>

    <div id="mainContent">
      <div id="statusBar">
        <span id="statusText">Scanning for phones...</span>
        <span id="pairedStatus"></span>
      </div>

      <div id="deviceList">
        <h3>Discovered Phones</h3>
        <div id="devices"></div>
        <p id="noDevices">No devices found yet. Make sure the app is open on your phone.</p>
      </div>

      <div id="pairedSection" class="hidden">
        <h3>Paired Device</h3>
        <div id="pairedInfo">
          <span id="pairedName"></span>
          <button id="unpairBtn">Unpair</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
