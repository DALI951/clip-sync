name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5
        working-directory: clip-sync-android

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        working-directory: clip-sync-android

      - name: Build signed APK
        run: ./gradlew assembleRelease
        working-directory: clip-sync-android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/clip-sync-android/debug.keystore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: clip-sync-android/app/build/outputs/apk/release/app-release.apk

  pc:
    runs-on: windows-latest
    needs: android

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Electron PC app
        run: npm install && npx electron-builder --win
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Tag version
        id: tag
        run: echo "version=v1.0.${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "ClipSync v1.0.${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads

            - **ClipSync.exe** — PC app (portable, runs in system tray)
            - **app-release.apk** — Android app (install on phone)

            ## How to use

            1. Download and run **ClipSync.exe** on your PC
            2. Install the APK on your phone
            3. Open both apps — they find each other automatically
            4. On first use: give your PC a name, then tap your phone to pair
            5. Clipboard auto-syncs both ways. No IPs, no links, no browser.
          files: |
            dist-electron/*.exe
            apk/app-release.apk
          make_latest: true
