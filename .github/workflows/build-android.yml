name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5
        working-directory: clip-sync-android

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        working-directory: clip-sync-android

      - name: Build signed APK
        run: ./gradlew assembleRelease
        working-directory: clip-sync-android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/clip-sync-android/debug.keystore

      - name: Package PC app
        run: |
          mkdir -p dist
          zip -r dist/clip-sync-pc.zip \
            server.js install-service.js uninstall-service.js \
            package.json package-lock.json start.bat \
            .gitignore README.md \
            -x "node_modules/*"

      - name: Tag version
        id: tag
        run: echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "ClipSync v1.0.${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads

            - **clip-sync-pc.zip** — PC server (unzip, double-click `start.bat`)
            - **app-release.apk** — Android app (install on phone)

            ## How to use

            1. Download **clip-sync-pc.zip**, unzip on your PC, double-click `start.bat`
            2. Install the APK on your phone
            3. Open the phone app, tap **Scan for PC**
            4. Select your PC from the list — done! Clipboard auto-syncs both ways
          files: |
            dist/clip-sync-pc.zip
            clip-sync-android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
